name: Update CV Data

on:
  push:
    paths:
      - 'website/CV_Arthur_Galichere.pdf'
      - 'website/CV_Arthur_Galichere_excel.xlsx'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pdfplumber openpyxl

      - name: Run Extraction and Cleaning
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python website/extract_pdf.py
          python website/llm_clean.py

      - name: Commit and Push Changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"
          git add website/cv.json
          
          # Check if there are changes
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes detected to cv.json."
          else
            git commit -m "chore: Update CV data [skip ci]"
            git push
            echo "Changes committed and pushed."
          fi
