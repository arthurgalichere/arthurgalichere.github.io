name: LLM-Powered CV Update

on:
  push:
    paths:
      - 'website/CV_Arthur_Galichere.pdf'
  workflow_dispatch:

jobs:
  llm-clean-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python Engine
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PDF Scraper Dependencies
        run: pip install pdfplumber # We only need pdfplumber now since Gemini runs on native urllib!

      - name: Run Stage 1 - Raw Extraction
        run: python website/extract_pdf.py

      - name: Run Stage 2 - Gemini LLM Processing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python website/llm_clean.py

      - name: Commit Perfect Outputs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add website/cv.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: Gemini AI-enhanced layout repair [skip ci]"
            git push
          else
            echo "No structural content modifications required."
          fi
