name: Auto-Update CV Data

on:
  push:
    paths:
      - 'website/CV_Arthur_Galichere.pdf'
  workflow_dispatch:

jobs:
  parse-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: pip install pdfplumber

      - name: Install Lightweight CPU PyTorch & Transformers
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers

      - name: Run Local Open-Source LLM Parser
        run: python parse_cv.py

      - name: Commit and Push Updated JSON
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add website/cv.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: local open-source AI layout clean [skip ci]"
            git push
          else
            echo "No structural content differences found."
          fi
